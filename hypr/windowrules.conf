# --- FLOATING RULES ---

# Reglas generales de flotación
windowrule = float on, match:class ^(org.kde.polkit-kde-authentication-agent-1)$
windowrule = float on, match:class ^(xfce-polkit)$
windowrule = float on, match:tag file-manager*, match:title (File Operation Progress)
windowrule = float on, match:class ([Tt]hunar), match:title (Confirm to replace files)
windowrule = float on, match:class ^(pavucontrol|org.pulseaudio.pavucontrol)$
windowrule = float on, match:class ^(nwg-look|qt5ct|qt6ct|mpv)$
windowrule = float on, match:class ^(kitty)$, match:title (update)
windowrule = float on, match:class ^(kitty)$, match:title (yazi)
windowrule = float on, match:class ^(kitty)$, match:title (monitor)
windowrule = float on, match:class ^(kitty)$, match:title (browser)
windowrule = float on, match:class ^(kitty)$, match:title (floating)
windowrule = float on, match:class ^(file-roller|org.gnome.FileRoller)$
windowrule = float on, match:class ^([Kk]vantummanager)$
windowrule = float on, match:class ^([Ll]xappearance)$
windowrule = float on, match:class ^(yad)$
windowrule = float on, match:class ^(eog)$
windowrule = float on, match:class ^([Gg]nome-disks)$
windowrule = float on, match:class ^(com.obsproject.Studio)$
windowrule = float on, match:class ^(org.kde.kcalc)$
windowrule = float on, match:class ^(org.telegram.desktop)$
windowrule = float on, match:class ^(org.kde.partitionmanager)$
windowrule = float on, match:class ^(org.kde.gwenview)$
windowrule = float on, match:class ^([Pp]rotonUp-Qt)$

# Thunar
windowrule = float on, match:class ^(Rename)$
windowrule = size 1000 700, match:class ^(Rename)$
windowrule = center on, match:class ^(Rename)$

#Blueman manager
windowrule = float on, match:class ^(blueman-manager)$
windowrule = size 1000 700, match:class ^(blueman-manager)$
windowrule = center on, match:class ^(blueman-manager)$

# File Operation Progress
windowrule = float on, match:class ([Tt]hunar), match:title (File Operation Progress)
windowrule = size 600 400, match:class ([Tt]hunar), match:title (File Operation Progress)
windowrule = center on, match:class ([Tt]hunar), match:title (File Operation Progress)

# Spotify
windowrule = float on, match:class ^(Spotify)$
windowrule = size 1000 700, match:class ^(Spotify)$
windowrule = center on, match:class ^(Spotify)$

#Update float
windowrule = float on, match:class ^(update_float)$
windowrule = size 1200 800, match:class ^(update_float)$
windowrule = center on, match:class ^(update_float)$

# Kitty Float
windowrule = float on, match:class ^(kitty_float)$
windowrule = size 1000 700, match:class ^(kitty_float)$
windowrule = center on, match:class ^(kitty_float)$

#Btop Float
windowrule = float on, match:class ^(btop_float)$
windowrule = size 1000 800, match:class ^(btop_float)$
windowrule = center on, match:class ^(btop_float)$

#File manager yazi
windowrule = float on, match:class ^(yazi_file_manager)$
windowrule = size 800 800, match:class ^(yazi_file_manager)$
windowrule = center on, match:class ^(yazi_file_manager)$

# ROG Control Center
windowrule = float on, match:class ^(rog-control-center)$
windowrule = center on, match:class ^(rog-control-center)$
windowrule = size 800 800, match:class ^(rog-control-center)$

#Calulator
windowrule = float on, match:class ^(org.gnome.Calculator)$
windowrule = size 400 500, match:class ^(org.gnome.Calculator)$
windowrule = center on, match:class ^(org.gnome.Calculator)$

#Gnome notes
windowrule = float on, match:class ^(org.gnome.Notes)$
windowrule = size 500 600, match:class ^(org.gnome.Notes)$
windowrule = center on, match:class ^(org.gnome.Notes)$

#Pinta
windowrule = float on, match:class ^(com.github.PintaProject.Pinta)$
windowrule = size 1000 800, match:class ^(com.github.PintaProject.Pinta)$
windowrule = center on, match:class ^(com.github.PintaProject.Pinta)$

# Rofi animacion derecha a izquierda (Slide right)
layerrule = animation slide right, match:namespace ^(rofi)$

windowrule {
    name = xwayland-video-bridge-fixes
    match:class = xwaylandvideobridge

    no_initial_focus = true
    no_focus = true
    no_anim = true
    no_blur = true
    max_size = 1 1
    opacity = 0.0
}

# ¡La magia! Le aplica la curva md3 que configuraste antes
layerrule = animation slide right, match:namespace ^(swaync-control-center)$
layerrule = animation fade, match:namespace ^(swaync-notification-window)$

# Otras reglas de autenticación y diálogos
windowrule = float on, match:title ^(Authentication Required)$
windowrule = center on, match:title ^(Authentication Required)$
# Nota: "negative:" se usa para negar una regex
windowrule = float on, match:class (codium|codium-url-handler|VSCodium), match:title negative:(.*codium.*|.*VSCodium.*)
windowrule = float on, match:class ^(com.heroicgameslauncher.hgl)$, match:title negative:(Heroic Games Launcher)
windowrule = float on, match:class ^([Ss]team)$, match:title negative:^([Ss]team)$
windowrule = float on, match:class (xdg-desktop-portal-gtk)
windowrule = float on, match:class (electron), match:title (Add Folder to Workspace)
windowrule = float on, match:title ^(Add Folder to Workspace)$

# --- SIZE RULES ---
# Nota: Si los porcentajes (%) fallan, usa: (monitor_w*0.6) (monitor_h*0.8)
windowrule = size 60% 80%, match:class ^([Kk]vantummanager)$
windowrule = size 60% 80%, match:class ^([Ll]xappearance)$
windowrule = size 800 800, match:class ^(nwg-look)$
windowrule = size 60% 80%, match:class ^(eog)$
windowrule = size 20% 40%, match:class ^([Tt]hunar)$, match:title (File Operation Progress)
windowrule = size 20% 40%, match:class ^([Tt]hunar)$, match:title (Confirm to replace files)
windowrule = size 70% 70%, match:class ^(xdg-desktop-portal-gtk)$
windowrule = size 60% 70%, match:title (Kvantum Manager)
windowrule = size 800 800, match:class ^(nwg-look|qt5ct|qt6ct|mpv)$
windowrule = size 800 600, match:class ^(pavucontrol|org.pulseaudio.pavucontrol)$
windowrule = size 70% 80%, match:class ^(kitty)$, match:title (update)
windowrule = size 60% 60%, match:class ^(kitty)$, match:title (yazi)
windowrule = size 50% 55%, match:class ^(kitty)$, match:title (monitor)
windowrule = size 50% 60%, match:class ^(kitty)$, match:title (browser)
windowrule = size 70% 80%, match:class ^(kitty)$, match:title (floating)
windowrule = size 50% 80%, match:class ^(com.obsproject.Studio)$
windowrule = size 60% 80%, match:class ^(org.telegram.desktop)$
windowrule = size 60% 80%, match:class ^(org.kde.gwenview)$
windowrule = size 50% 60%, match:class ^(org.kde.partitionmanager)$
windowrule = size 30% 55%, match:class ^(org.kde.kcalc)$
windowrule = size 60% 80%, match:class ^(org.gnome.Notes)$
windowrule = size 30% 20%, match:class ^(xfce-polkit)$

# --- POSITION RULES ---
windowrule = center on, match:class ([Tt]hunar), match:title (File Operation Progress)
windowrule = center on, match:class ([Tt]hunar), match:title (Confirm to replace files)
windowrule = center on, match:class ^(nwg-look)$
windowrule = center on, match:class ^(qt5ct)$
windowrule = center on, match:class ^(lxappearance)$
windowrule = center on, match:class ^(yad)$
windowrule = center on, match:class ^(pavucontrol)$
windowrule = center on, match:class ^(kitty)$, match:title (yazi|update|browser)
windowrule = center on, match:class ^(org.gnome.Notes)$

# --- OPACITY RULES ---
#windowrule = opacity $opacity_act $opacity_deact, match:tag ide*
#windowrule = opacity $opacity_act $opacity_deact, match:tag terminal*
#windowrule = opacity $opacity_act $opacity_deact, match:tag file-manager*
#windowrule = opacity 1.0 $opacity_deact, match:tag browser*

# --- WORKSPACE SPECIAL ---
# (Esto suele ir en workspace rules, pero si te funcionaba aquí, se mantiene igual)
workspace = special:exposed,gapsout:60,gapsin:30,bordersize:5,border:true,shadow:false

# --- LAYER RULES (Barras, notificaciones, rofi) ---
# La sintaxis ahora requiere 'match:namespace' explícito
# --- BLUR PARA SWAYNC (Sintaxis Moderna) ---
layerrule = blur on, match:namespace ^(swaync-control-center)$
layerrule = blur on, match:namespace ^(swaync-notification-window)$

layerrule = ignore_alpha 0.5, match:namespace ^(swaync-control-center)$
layerrule = ignore_alpha 0.5, match:namespace ^(swaync-notification-window)$

layerrule = animation slide right, match:namespace ^(swaync-control-center)$
layerrule = animation fade, match:namespace ^(swaync-notification-window)$

# 'blurls' es obsoleto, usa layerrule con namespace
layerrule = blur on, match:namespace code

layerrule = ignore_alpha 0.5, match:namespace swaync-control-center
layerrule = ignore_alpha 0.5, match:namespace swaync-notification-window
layerrule = blur on, match:namespace wlogout
layerrule = blur on, match:namespace logout_dialog
layerrule = ignore_alpha 0, match:namespace logout_dialog
layerrule = ignore_alpha 0.5, match:namespace logout_dialog

#Brave (Inicio de sesion de Google)
windowrule = float on, match:class ^(brave-browser)$, match:title (Inicia sesión: Cuentas de Google - Brave)
windowrule = size 600 400, match:class ^(brave-browser)$, match:title (Inicia sesión: Cuentas de Google - Brave)
windowrule = center on, match:class ^(brave-browser)$, match:title (Inicia sesión: Cuentas de Google - Brave)

windowrule = immediate on, match:class ^(Quaver)$
windowrule = immediate on, match:class ^(Geometry Dash)$