# 🌙✨ SAILOR MOON HYPRLOCK (LEFT ALIGN) ✨🌙

general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = true
}

# --- FONDO ---
background {
    monitor =
    # ⚠️ NO OLVIDES PONER TU RUTA AQUÍ
    path = /home/moonly/Wallpapers/SailorMoon.jpg
    
    blur_passes = 2
    blur_size = 5
    noise = 0.01
    contrast = 0.9
    brightness = 0.8
    vibrancy = 0.17
}

# --- HORA (Gigante y a la izquierda) ---
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(255, 255, 255, 1.0)
    font_size = 120
    font_family = CaskaydiaCove Nerd Font Bold
    
    # Sombra rosada mágica
    shadow_passes = 2
    shadow_size = 5
    shadow_color = rgb(ff99cc)

    # Alineado a la izquierda con margen de 80px
    halign = left
    valign = center
    position = 80, 100
}

# --- FECHA (Debajo de la hora) ---
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d %B")"
    color = rgb(153, 204, 255) # Azul Mercury
    font_size = 28
    font_family = CaskaydiaCove Nerd Font
    
    halign = left
    valign = center
    position = 85, 20 # Un poco más abajo de la hora
}

# --- SALUDO / USUARIO ---
label {
    monitor =
    text = 🌙 Moonly System
    color = rgb(255, 215, 0) # Dorado Venus
    font_size = 18
    font_family = CaskaydiaCove Nerd Font Bold
    
    halign = left
    valign = center
    position = 85, -30
}

# --- BARRA DE INPUT (Persistente) ---
input-field {
    monitor =
    size = 300, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    dots_rounding = -1
    
    # Colores
    outer_color = rgb(ff99cc) rgb(99ccff) 90deg
    inner_color = rgba(20, 20, 40, 0.9)
    font_color = rgb(255, 255, 255)
    
    # --- PERSISTENCIA ---
    fade_on_empty = false  # <--- ESTO hace que nunca desaparezca
    placeholder_text = <i>Contraseña...</i>
    hide_input = false
    rounding = 10 # Bordes redondeados pero no cápsula total (más técnico)
    
    check_color = rgb(255, 204, 102)
    fail_color = rgb(255, 102, 102)
    fail_text = <i>ERROR ✖</i>
    
    # Alineado a la izquierda debajo de todo
    halign = left
    valign = center
    position = 80, -100
}
