# =============================================================================
#  KEYBINDINGS
# =============================================================================

$mainMod = SUPER
$terminal = kitty
$fileManager = thunar
$menu = rofi -show drun
$scripts = $HOME/.config/hypr/scripts

# -- SYSTEM ---
bind = $mainMod SHIFT, R, exec, $scripts/reload.sh
bind = $mainMod, X, exec, wlogout
bind = $mainMod, W, exec, [float;size 800 600;center] waypaper
bind = $mainMod ALT, W, exec, ~/.config/hypr/scripts/wallpaper-random.sh
bind = $mainMod, D, exec, $menu -theme ~/.config/rofi/launcher.rasi
bind = ALT, Tab, exec, rofi -show window -theme ~/.config/rofi/launcher.rasi
bind = $mainMod, V, exec, cliphist list | rofi -dmenu -theme ~/.config/rofi/style.rasi -p " Portapapeles" | cliphist decode | wl-copy
bind = $mainMod SHIFT, V, exec, rm -f ~/.cache/cliphist/db && notify-send "Portapapeles" "Base de datos reiniciada (Contador a 0)" -i edit-delete
bind = $mainMod SHIFT, S, exec, ~/.config/hypr/scripts/screenshot_gui.sh
bind = , Print, exec, ~/.config/hypr/scripts/screenshot_gui.sh
bind = $mainMod, G, exec, ~/.config/hypr/scripts/gamemode.sh
bind = CONTROL, U, exec, ~/.config/waybar/scripts/updates.sh update
bind = $mainMod SHIFT, L, exec, ~/.config/hypr/scripts/lock.sh
bind = $mainMod, N, exec, ~/.config/hypr/scripts/minimize.sh hide
bind = $mainMod SHIFT, N, exec, ~/.config/hypr/scripts/minimize.sh restore
bindl = $mainMod, P, exec, grim ~/captura_lock.png && notify-send "Captura de pantalla" "Guardada como captura_lock.png" -i image-missing
bind = $mainMod SHIFT, B, exec, blueman-manager
bind = $mainMod SHIFT, P, exec, ~/.config/hypr/scripts/monitor_wizard.sh
bind = $mainMod CTRL, W, exec, ~/.config/hypr/scripts/theme_selector.sh
bind = $mainMod, O, exec, ~/.config/waybar/scripts/updates.sh
#Pyprland
bind = $mainMod, A, exec, pypr toggle term
bind = $mainMod ALT, E, exec, pypr toggle yazi
bind = SUPER, SPACE, exec, ~/.config/hypr/scripts/kb_change.sh

# --- APPS ---
bind = $mainMod, Return, exec, $terminal
bind = $mainMod SHIFT, Return, exec, $terminal --class kitty_float
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, B, exec, brave
bind = $mainMod, C, exec, ~/.config/hypr/scripts/rofi_vscode.sh
bind = $mainMod SHIFT, C, exec, notify-send "VSCode" "Abriendo carpeta de configuración en VSCode" && code ~/.config/hypr
bind = $mainMod CTRL, S, exec, pavucontrol
bind = $mainMod SHIFT, o, exec, notify-send -i osu-lazer -t 2000 "osu!lazer" "Ejecutando con prime-run" && prime-run osu-lazer

# --- WINDOW MANAGEMENT ---
bind = $mainMod, Q, killactive, 
bind = $mainMod, M, exit,
bind = $mainMod, F, fullscreen, 
bind = $mainMod, t, togglefloating, 

# --- FOCUS MOVEMENT ---
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# --- WORKSPACES (1-10) ---
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

# Move active window to a workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

# --- MOUSE RESIZE ---
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# El flag 'e' (repeat) permite dejar presionada la tecla
bindel = , XF86AudioRaiseVolume, exec, ~/.config/hypr/scripts/osd.sh vol_up
bindel = , XF86AudioLowerVolume, exec, ~/.config/hypr/scripts/osd.sh vol_down
bindl  = , XF86AudioMute, exec, ~/.config/hypr/scripts/osd.sh vol_mute
bindl = , XF86AudioMicMute, exec, ~/.config/hypr/scripts/osd.sh mic_mute

# Brillo de pantalla
bindel = , XF86MonBrightnessUp, exec, ~/.config/hypr/scripts/osd.sh bri_up
bindel = , XF86MonBrightnessDown, exec, ~/.config/hypr/scripts/osd.sh bri_down

# Control de reproducción (Play/Pause)
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

# Atajos alternativos para control de reproducción
bindl = $mainMod, F7, exec, playerctl previous
bindl = $mainMod, F8, exec, playerctl play-pause
bindl = $mainMod, F9, exec, playerctl next