# --- ARRANQUE ---
# Fondo de pantalla (Hyprpaper nativo)
exec-once = awww-daemon
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Barra de estado
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = nm-applet --indicator
exec-once = blueman-applet
exec-once = sleep 2 && waybar
exec-once = steam-nvidia -no-cef-sandbox
exec-once = rog-control-center

# Notificaciones
exec-once = swaync

# Pyprland
exec-once = pypr

# Hyprlock
exec-once = hypridle

# Agente de autenticación (para que te pida contraseña en GUI)
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = ~/.config/hypr/scripts/usb_monitor.sh
exec-once = ~/.config/hypr/scripts/battery_monitor.sh
exec-once = ~/.config/hypr/scripts/kb-state.sh
