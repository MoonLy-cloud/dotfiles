# =============================================================================
#  STYLE.CONF — CONFIGURACIÓN DEFINITIVA
#  Setup: RTX 3000 | nvidia-open | Laptop Optimus | Modo ULTIMATE
#  Compatible con: Hyprland 0.50+ (0.53 actual a Marzo 2026)
#  Última revisión: Marzo 2026
# =============================================================================

# Colores de pywal — tus variables $color0, $color4, $color6, etc.
source = /home/moonly/.cache/wal/colors-hyprland.conf

# =============================================================================
#  GENERAL
# =============================================================================

general {
    gaps_in  = 4
    gaps_out = 0
    border_size = 2

    # Gradiente animado con tus colores de pywal
    col.active_border   = $color4 $color6 45deg
    col.inactive_border = $color0

    layout = dwindle

    # Permite tearing en ventanas que lo piden (juegos, fullscreen)
    # Requiere windowrule = immediate, <clase_del_juego>
    allow_tearing = true

    # NUEVO en 0.47+: snap de ventanas flotantes a bordes/otras ventanas
    # Reemplaza plugins externos de snapping
    snap {
        enabled          = true
        window_gap       = 10   # px de distancia para activar el snap
        monitor_gap      = 10
        border_overlap   = true
    }
}

# =============================================================================
#  DECORATION
# =============================================================================

decoration {
    rounding = 10

    # NUEVO en 0.47+: squircles (esquinas tipo iOS/macOS)
    # Cambia a true si prefieres ese estilo en lugar del rounding clásico
    rounding_power = 2.0   # 2.0 = circular clásico, >2 = más squircle

    active_opacity   = 1.0
    inactive_opacity = 0.9

    blur {
        enabled = false
        size    = 3
        passes  = 1
        # new_optimizations fue REMOVIDO en versiones recientes — ya no existe
        vibrancy = 0.1696
    }

    shadow {
        enabled = false
    }
}

# =============================================================================
#  ANIMATIONS
# =============================================================================

animations {
    enabled = true

    # --- BEZIERS MATERIAL DESIGN 3 ---
    # Deceleración enfatizada (Google Pixel standard)
    bezier = md3_standard, 0.2, 0, 0, 1
    bezier = md3_decel,    0.05, 0.7, 0.1, 1
    bezier = md3_accel,    0.3, 0, 0.8, 0.15

    # --- VENTANAS (El estándar de Pixel) ---
    animation = windowsIn,   1, 4, md3_decel, popin 60%
    animation = windowsOut,  1, 3, md3_accel, popin 80%
    animation = windowsMove, 1, 4, md3_decel, slide

    # --- FADE ---
    animation = fadeIn,      1, 3, md3_decel
    animation = fadeOut,     1, 3, md3_accel
    animation = fadeSwitch,  0, 1, md3_decel
    animation = fadeShadow,  1, 4, md3_decel

    # =======================================================
    # --- TRANSICIONES DE WORKSPACES (Estilo Google) ---
    # =======================================================
    
    # OPCIÓN 1: "Google Discover" (Deslizamiento Profundo) - ACTIVA POR DEFECTO
    # Desliza pero se desvanece fuertemente (40%). Da la sensación de que 
    # el nuevo escritorio está empujando al anterior hacia el fondo.
    animation = workspaces, 1, 5, md3_decel, slidevert
}

# =============================================================================
#  MISC
# =============================================================================

misc {
    disable_hyprland_logo    = true
    disable_splash_rendering = true

    # Activa DPMS con mouse/teclado (ahorra batería en laptop)
    mouse_move_enables_dpms = true
    key_press_enables_dpms  = true

    # RENOMBRADO en 0.53: disable_hyprland_qtutils_check ->
    disable_hyprland_guiutils_check = true
    vrr = 1
    #vfr = true

    # Oculta workspaces al compartir pantalla (privacidad)
    # NUEVO en 0.50 — true por defecto, lo dejamos explícito
}

# =============================================================================
#  RENDER
# =============================================================================

render {
    # direct_scanout: bypass del compositor en fullscreen — mejora latencia
    # con NVIDIA open + ULTIMATE puede causar tearing, desactívalo si lo ves
    direct_scanout = false

    # NUEVO en 0.50 (experimental): triple buffering dinámico
    # Mejora FPS en momentos de carga alta sin costo cuando el sistema va bien
    # Actívalo si notas drops de FPS en tu laptop bajo carga
    # new_render_scheduling = true

    # REMOVIDOS en 0.50 — NO agregar:
    # explicit_sync → ahora siempre activo por defecto
    # render_ahead_of_time → eliminado
}

# =============================================================================
#  XWAYLAND
# =============================================================================

xwayland {
    # Evita que apps XWayland se vean borrosas por el escalado
    force_zero_scaling = true
}

# =============================================================================
#  DWINDLE (tu layout activo)
# =============================================================================

dwindle {
    #pseudotile     = true
    preserve_split = true
    smart_split    = false
    smart_resizing = true
}

# =============================================================================
#  NOTAS DE VARIABLES ELIMINADAS/CAMBIADAS
# =============================================================================
# blur: new_optimizations     → REMOVIDA (ya no existe)
# render: explicit_sync       → REMOVIDA (siempre activo desde 0.50)
# render: render_ahead_of_time → REMOVIDA desde 0.50
# misc: disable_hyprland_qtutils_check → renombrada a disable_hyprland_guiutils_check
# togglesplit / swapsplit     → REMOVIDOS (usa layoutmsg en su lugar)