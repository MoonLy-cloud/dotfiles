# --- FUENTES (Nerd Fonts) ---
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# --- VENTANA ---
window_padding_width 10
background_opacity 0.85
# hide_window_decorations yes  # Descomenta si quieres quitar la barra de título

# --- COLORES (Tema tipo "Tokyo Night" básico) ---
foreground #a9b1d6
background #1a1b26
color0 #15161e
color8 #414868
color1 #f7768e
color9 #f7768e
color2 #9ece6a
color10 #9ece6a
color4 #7aa2f7
color12 #7aa2f7

# --- ATAJOS UTILES ---
# Copiar/Pegar con Ctrl+C / Ctrl+V (estándar moderno)
map ctrl+c copy_to_clipboard
map ctrl+v paste_from_clipboard
