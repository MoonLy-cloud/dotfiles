# 🌸 HYPRLOCK: SAKURA & PYWAL EDITION 🌸

# 1. Importamos los colores dinámicos que Pywal generó para Hyprland
source = ~/.cache/wal/colors-hyprland.conf

# 2. FONDO: Toma una captura de tu escritorio y la desenfoca
background {
    monitor =
    path = ~/.config/hyprlock/screenshot.png
    blur_passes = 1    # Empieza con 1, no con 3. Es mucho más ligero para el buffer.
    blur_size = 7
    noise = 0.0117
    contrast = 1.3000
    brightness = 0.8000
    vibrancy = 0.2100
    vibrancy_darkness = 0.0
}

# 3. CAJA DE CONTRASEÑA
input-field {
    monitor =
    size = 300, 60
    outline_thickness = 3
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    # Usamos el color de acento principal de Pywal para el borde
    outer_color = $color4
    inner_color = rgba(10, 10, 14, 0.8)
    font_color = $foreground
    fade_on_empty = false
    font_family = CaskaydiaCove Nerd Font
    placeholder_text = <i><span foreground="##ffffff99">🌸 Contraseña...</span></i>
    hide_input = false
    position = 0, -80
    halign = center
    valign = center
}

# 4. HORA
label {
    monitor =
    text = cmd[update:1000] echo "<b>$(date +"%H:%M")</b>"
    # El reloj tomará el color de tu fondo (foreground)
    color = $foreground
    font_size = 120
    font_family = CaskaydiaCove Nerd Font
    position = 0, 150
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 4
}

# 5. FECHA
label {
    monitor =
    text = cmd[update:1000] echo "<b>$(date +"%A, %d de %B")</b>"
    # El color del borde de tus ventanas
    color = $color4
    font_size = 30
    font_family = CaskaydiaCove Nerd Font
    position = 0, 30
    halign = center
    valign = center
}

# 6. BATERÍA DIRECTA DEL SISTEMA (Sin scripts)
label {
    monitor =
    # Lee directamente la capacidad de tu batería BAT0 (común en ASUS ROG)
    text = cmd[update:5000] echo "<b>󰁹 $(cat /sys/class/power_supply/BAT0/capacity)%</b>"
    color = $foreground
    font_size = 20
    font_family = CaskaydiaCove Nerd Font
    position = -30, -30
    halign = right
    valign = top
}

# CANCIÓN ACTUAL (Spotify)
label {
    monitor =
    text = cmd[update:1000] echo "$(~/.config/hyprlock/Scripts/songdetail.sh)" 
    color = rgba(255, 255, 255, 0.7)
    font_size = 18
    font_family = CaskaydiaCove Nerd Font
    position = 0, 60
    halign = center
    valign = bottom
}

# PORTADA DEL ÁLBUM (Spotify / Media)
image {
    monitor =
    path = ~/.config/hyprlock/hyprlock.png
    size = 180 # Tamaño del cuadrito del álbum
    rounding = 15 # Bordes redondeados
    border_size = 3
    border_color = $color4 # Borde dinámico de Pywal
    rotate = 0
    
    # Cada 2 segundos ejecuta el script. Si la canción cambió, actualiza la foto.
    reload_time = 2
    reload_cmd = ~/.config/hyprlock/Scripts/album_art.sh
    
    # Posición: Centrado, un poco más arriba del texto de la canción
    position = 0, 120
    halign = center
    valign = bottom
}

# 7. USUARIO ACTUAL
label {
    monitor =
    text =   $USER
    color = $foreground
    font_size = 18
    font_family = CaskaydiaCove Nerd Font
    position = 0, 30
    halign = center
    valign = bottom
}